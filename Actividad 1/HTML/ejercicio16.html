<!--Ejercicio 16
Calculadora de Números (Operaciones Básicas) utilizando
Funciones Flecha en JavaScript
Planteamiento del problema:
El objetivo del ejercicio es crear una calculadora web que permita al usuario realizar
operaciones básicas (suma, resta, multiplicación y división) entre dos números ingresados.
Para ello, se utilizarán funciones flecha en JavaScript. La aplicación tendrá un formulario
con dos campos de entrada para los números y un conjunto de botones para realizar cada
operación. Los resultados de las operaciones se mostrarán en una caja de texto de solo lectura
(readonly).
Utilizar https://sweetalert2.github.io/ para mostrar al usuario los mensajes de error.
-->

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 16</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="../JS/ejercicio16.js"></script>
</head>

<body>
    <div class="container" style="margin: 50px auto;">
        <h1>Calculadora de Números (Operaciones Básicas) utilizando
            Funciones Flecha en JavaScript</h1>
        <form>
            <div class="form-group">
                <label for="numero1">Número 1:</label>
                <input type="number" class="form-control" id="numero1">
            </div>
            <div class="form-group">
                <label for="numero2">Número 2:</label>
                <input type="number" class="form-control" id="numero2">
            </div>
            <div style="margin:10px auto; display: flex; gap: 10px;">
                <button type="button" class="btn btn-primary" onclick="calcular('suma')">Suma</button>
                <button type="button" class="btn btn-primary" onclick="calcular('resta')">Resta</button>
                <button type="button" class="btn btn-primary"
                    onclick="calcular('multiplicacion')">Multiplicacion</button>
                <button type="button" class="btn btn-primary" onclick="calcular('division')">Division</button>
            </div>
        </form>
        <div class="form-group">
            <label for="resultado">Resultado:</label>
            <input type="text" class="form-control" id="resultado" readonly>
        </div>
    </div>
</body>

</html>
