<!--Ejercicio17
Gestión de Tareas Pendientes con JSON, Local Storage, Funciones,
Closures y Scope
Planteamiento del problema:
Vas a desarrollar una aplicación sencilla de "Gestión de Tareas" que permita al usuario
agregar, visualizar y eliminar tareas. Las tareas se almacenarán en el Local Storage en
formato JSON para que los datos persistan incluso después de cerrar el navegador. El
ejercicio incluirá el uso de funciones, closures, y entenderás cómo funciona el scope en
JavaScript.

El boton de eliminar tarea debera aparecer en cada tarea lista, ademas este no se debe mostrar si no hay tareas. 
Local Storage y JSON:
o Las tareas se almacenan en formato JSON. agregarTarea() convierte el
array de tareas a JSON usando JSON.stringify() antes de almacenarlo en
Local Storage.
o obtenerTareas() recupera las tareas y usa JSON.parse() para convertirlas
de JSON a un array JavaScript.
2. Funciones Flecha y Closures:
o manejarTareas es un closure que encapsula la lógica de agregar y eliminar
tareas. Esto permite que las funciones agregar y eliminar se mantengan
privadas dentro del closure, protegiendo su estado.

3. Scope:
o Las variables como tareas tienen scope local dentro de las funciones
agregarTarea() y obtenerTareas(). No se puede acceder a estas
variables desde fuera de esas funciones, lo que asegura que el manejo de las
tareas sea seguro.
-->
