<!--Ejercicio 15
Desarrollar una página web que permita al usuario ingresar datos de varios estudiantes, como
su nombre y calificación, y luego, al hacer clic en un botón, se realicen las siguientes
operaciones utilizando objetos en JavaScript:
1. Calcular y mostrar la calificación promedio de todos los estudiantes.
2. Mostrar el nombre del estudiante con la calificación más alta.
3. Mostrar el nombre del estudiante con la calificación más baja.
El resultado de cada operación se mostrará en una caja de texto de solo lectura (readonly).
-->

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 15</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../JS/ejercicio15.js"></script>
</head>

<body>
    <div class="container" style="margin: 50px auto;">
        <h1>Calculadora de estudiantes</h1>
        <form>
            <div class="form-group" style="margin: 10px auto;">
                <label for="name">Nombre:</label>
                <input type="text" class="form-control" id="name" placeholder="Ingrese el nombre del estudiante">
            </div>
            <div class="form-group" style="margin: 10px auto;">
                <label for="grade">Calificación:</label>
                <input type="number" class="form-control" id="grade" placeholder="Ingrese la calificación">
            </div>
            <button type="button" class="btn btn-success" style="margin: 10px auto;"
                onclick="agregarEstudiante()">Agregar</button>
            <button type="button" class="btn btn-primary" style="margin: 10px auto;"
                onclick="calcularEstudiantes()">Calcular</button>
        </form>
        <div class="form-group" style="margin: 10px auto;">
            <label for="result">Resultado:</label>
            <input type="text" class="form-control" id="result" readonly>
        </div>
    </div>
</body>

</html>
