<!--Ejercicio 9. Formulario de contacto:
form, fieldset + legend, input, textarea, select + option, label, button(submit, reset) datalist-->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 9</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body>
    <div class="container mt-5">
        <form class="p-4 border rounded shadow-sm bg-light" style="max-width: 500px; margin: auto;">
            <fieldset>
                <legend class="mb-4 text-primary fw-bold">Formulario de contacto</legend>
                
                <div class="mb-3">
                    <label for="nombre" class="form-label">Nombre:</label>
                    <input type="text" id="nombre" name="nombre" class="form-control" placeholder="Tu nombre">
                </div>
                
                <div class="mb-3">
                    <label for="email" class="form-label">Email:</label>
                    <input type="email" id="email" name="email" class="form-control" placeholder="tu@email.com">
                </div>
                
                <div class="mb-3">
                    <label for="mensaje" class="form-label">Mensaje:</label>
                    <textarea id="mensaje" name="mensaje" class="form-control" rows="4" placeholder="Escribe tu mensaje..."></textarea>
                </div>
                
                <div class="text-end">
                    <input type="submit" value="Enviar" class="btn btn-primary px-4">
                </div>
            </fieldset>
        </form>
    </div>
</body>

</html>
