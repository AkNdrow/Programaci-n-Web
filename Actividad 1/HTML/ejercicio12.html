<!--Ejercicio 12
Crear una calculadora web sencilla que convierta pesos mexicanos (MXN) a dólares
estadounidenses (USD) usando HTML y JavaScript. El usuario ingresará una cantidad en
pesos en un campo de texto, y al hacer clic en un botón, la conversión se realizará utilizando
una tasa de cambio predefinida. El resultado se mostrará en una caja de texto de solo lectura
(readonly), donde el usuario no podrá modificar el resultado.
-->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 12</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../JS/ejercicio12.js"></script>
</head>

<body>
    <div class="container" style="margin: 50px auto;">
        <h1>Convertidor de pesos mexicanos a dólares</h1>
        <form>
            <div class="form-group">
                <label for="pesos">Pesos mexicanos:</label>
                <input type="number" class="form-control" id="pesos">
            </div>
            <button type="button" style="margin:10px auto" class="btn btn-primary"
                onclick="convertirPesosADolares()">Convertir</button>
        </form>
        <div class="form-group">
            <label for="dolares">Dólares:</label>
            <input type="text" class="form-control" id="dolares" readonly>
        </div>
    </div>
</body>

</html>
