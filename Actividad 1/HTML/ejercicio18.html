Ejercicio Práctico: Manipulación del DOM
En este ejercicio, haremos una pequeña aplicación web que permite agregar y eliminar
elementos de una lista dinámica. Cada vez que un usuario escriba un elemento en un campo
de texto y haga clic en el botón "Agregar", el elemento se agregará a una lista. Además,
cada elemento de la lista tendrá un botón para eliminarlo.

Explicación del Ejercicio:
1. Seleccionar elementos del DOM:
o Utilizamos document.getElementById para obtener el campo de texto, el botón
y la lista donde se agregarán los elementos.

2. Agregar elementos a la lista:
o Cuando el usuario hace clic en el botón "Agregar", se obtiene el valor del campo de
texto y se crea un nuevo elemento li.
o Si el valor no está vacío, se añade el texto como nodo de texto dentro del li, y luego
se agrega este nuevo li al ul existente.

3. Eliminar elementos:
o Cada li que se agrega a la lista también contiene un botón de "Eliminar". Cuando
el usuario hace clic en ese botón, el elemento li se elimina del DOM con el método
remove().

4. Limpieza del campo de texto:
o Una vez que se agrega un nuevo elemento a la lista, se limpia el campo de texto
para que el usuario pueda seguir añadiendo más elementos.
-->
