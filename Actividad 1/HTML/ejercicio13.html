<!--Ejercicio 13
Desarrollar una calculadora web que determine si una persona puede votar en función de su
edad utilizando HTML y JavaScript. El usuario ingresará su edad en un campo de texto, y al
hacer clic en un botón, el sistema verificará si la persona es mayor o igual a 18 años y le
informará si puede votar o no. El resultado se mostrará en una caja de texto de solo lectura
(readonly) con el mensaje "Puedes votar" o "No puedes votar", según el caso.
-->

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 13</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../JS/ejercicio13.js"></script>
</head>

<body>
    <div class="container" style="margin: 50px auto;">
        <h1>Calculadora de votación</h1>
        <form>
            <div class="form-group">
                <label for="age">Edad:</label>
                <input type="number" class="form-control" id="age">
            </div>
            <button style="margin:10px auto" type="button" class="btn btn-primary"
                onclick="checkAge()">Verificar</button>
        </form>
        <div class="form-group">
            <label for="result">Resultado:</label>
            <input type="text" class="form-control" id="result" readonly>
        </div>
    </div>
</body>

</html>
