<!--Ejercicio 14
Desarrollar una página web que permita al usuario ingresar varios números en un campo de
texto y, al hacer clic en un botón, se realicen las siguientes operaciones sobre los números
utilizando un arreglo en JavaScript:
1. Calcular y mostrar el número mayor.
2. Calcular y mostrar el número menor.
3. Calcular y mostrar el promedio de todos los números.
El resultado de cada operación se mostrará en una caja de texto de solo lectura (readonly).
-->

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 14</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../JS/ejercicio14.js"></script>
</head>

<body>
    <div class="container" style="margin: 50px auto;">
        <h1>Calculadora de números</h1>
        <form>
            <div class="form-group">
                <p style="color: #6c757dff;">Ingresa los números separados por comas</p>
                <label for="numbers">Números:</label>
                <input type="text" class="form-control" id="numbers">
            </div>
            <button type="button" class="btn btn-primary" style="margin:10px auto"
                onclick="calcularNumeros()">Calcular</button>
        </form>
        <div class="form-group">
            <label for="result">Resultado:</label>
            <input type="text" class="form-control" id="result" readonly>
        </div>
    </div>
</body>

</html>
