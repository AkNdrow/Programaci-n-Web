<!--Ejercicio10 - En una pagina web se requiere desarrollar una calculadora sencilla
que convierta grados Celsius en Fahrenheit.
El resultado se debe mostrar en una caja de texto con la propiedad de readonly, lo que permitira visualizar
la conversion, sin intervencion del usuario
Haciendo uso de buttons para la conversion.
-->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 10</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body>
    <div class="container mt-5">
        <form class="p-4 border rounded shadow-sm bg-light" style="max-width: 500px; margin: auto;">
            <fieldset>
                <legend class="mb-4 text-primary fw-bold text-center">Calculadora °C a °F</legend>
                
                <div class="mb-3">
                    <label for="celsius" class="form-label fw-semibold">Grados Celsius:</label>
                    <div class="input-group">
                        <input type="number" id="celsius" name="celsius" class="form-control" placeholder="Ej: 25">
                        <span class="input-group-text">°C</span>
                    </div>
                </div>
                
                <div class="mb-4">
                    <label for="fahrenheit" class="form-label fw-semibold">Grados Fahrenheit:</label>
                    <div class="input-group">
                        <input type="text" id="fahrenheit" name="fahrenheit" class="form-control bg-white" readonly placeholder="Resultado">
                        <span class="input-group-text">°F</span>
                    </div>
                </div>
                
                <div class="d-flex justify-content-between">
                    <button type="reset" class="btn btn-secondary px-4">Limpiar</button>
                    <button type="submit" class="btn btn-primary px-4">Convertir</button>
                </div>
            </fieldset>
        </form>
    </div>
</body>

</html>
