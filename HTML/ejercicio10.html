<!--Ejercicio10 - En una pagina web se requiere desarrollar una calculadora sencilla
que convierta grados Celsius en Fahrenheit.
El resultado se debe mostrar en una caja de texto con la propiedad de readonly, lo que permitira visualizar
la conversion, sin intervencion del usuario
Haciendo uso de buttons para la conversion.
-->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 10</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body>
    <form class="form-control">
        <fieldset>
            <legend>Calculadora de Celsius a Fahrenheit</legend>
            <label for="celsius">Celsius:</label>
            <input type="text" id="celsius" name="celsius">
            <br>
            <label for="fahrenheit">Fahrenheit:</label>
            <input type="text" id="fahrenheit" name="fahrenheit" readonly>
            <br>
            <button type="submit" value="Convertir">Convertir</button>
            <button type="reset" value="Limpiar">Limpiar</button>
        </fieldset>
    </form>
</body>

</html>
